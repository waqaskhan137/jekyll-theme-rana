<!-- Reading mode: flag individual post pages so custom.css can hide the side panels.
     Set synchronously in <head> (before paint) to avoid any flash of the sidebar. -->
<script>if(location.pathname.indexOf('/posts/')===0)document.documentElement.classList.add('reading-mode');</script>

<!-- Brand alignment: DM Sans + Fira Code matching waqasrana.space -->
<link rel="preload" as="style"
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap">

<!-- Mermaid (global): render ```mermaid fenced blocks in any post, no per-post front matter needed -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  function pickTheme() {
    const m = document.documentElement.getAttribute('data-mode');
    const dark = m === 'dark' || (!m && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
    return dark ? 'dark' : 'default';
  }
  mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: pickTheme() });
  async function renderMermaid() {
    document.querySelectorAll('code.language-mermaid').forEach(function (c) {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = c.textContent;
      (c.closest('pre') || c).replaceWith(div);
    });
    if (document.querySelector('.mermaid')) {
      try { await mermaid.run({ querySelector: '.mermaid' }); } catch (e) { console.warn('mermaid render failed', e); }
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderMermaid);
  else renderMermaid();
</script>
